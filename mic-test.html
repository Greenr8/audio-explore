<!DOCTYPE html>
<html>
<head><title>Микрофон тест</title></head>
<body>
  <h2>Тест микрофона</h2>
  <button id="testBtn">Проверить микрофон</button>
  <p id="status"></p>
  <audio id="player" controls style="display:none;"></audio>
  
  <script>
    document.getElementById('testBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      const player = document.getElementById('player');
      
      try {
        status.textContent = 'Запрашиваю микрофон...';
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        status.textContent = '✅ Микрофон работает! Говори...';
        
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          player.src = URL.createObjectURL(blob);
          player.style.display = 'block';
          status.textContent = '✅ Запись готова! Нажми Play.';
          stream.getTracks().forEach(t => t.stop());
        };
        
        recorder.start();
        
        setTimeout(() => {
          recorder.stop();
        }, 3000); // Записываем 3 секунды
        
      } catch (err) {
        status.textContent = '❌ Ошибка: ' + err.name + ' - ' + err.message;
      }
    });
  </script>
</body>
</html>
