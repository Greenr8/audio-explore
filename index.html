<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Музыкальный тест</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 15px; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #stimulusArea, #doneMsg, #welcomeScreen { margin-top: 20px; }
    #loadingMsg { text-align: center; margin-top: 30px; font-size: 18px; color: #555; }
    textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    .record-section { margin: 15px 0; padding: 10px; background: #f0f0f0; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="testContainer">
    <div id="welcomeScreen">
      <h2>Музыкальный тест</h2>
      <p>Введите имя (необязательно) и нажмите «Начать».</p>
      <input type="text" id="participantName" placeholder="Ваше имя или псевдоним" style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">
      <button id="startBtn">Начать тест</button>
    </div>

    <div id="loadingMsg" style="display:none;">Загрузка...</div>

    <div id="stimulusArea" style="display:none;">
      <p id="stimulusText" style="font-weight:bold; font-size: 18px;"></p>
      <audio id="stimulusAudio" controls style="width:100%; margin:15px 0;">
        <source id="audioSource" src="" type="audio/mpeg">
      </audio>
      <button id="playBtn" style="display:none;">▶ Воспроизвести снова</button>
      
      <div style="margin-top: 20px;">
        <label><strong>Ваш ответ текстом:</strong></label><br>
        <textarea id="textResponse" rows="3"></textarea>
      </div>

      <div class="record-section">
        <p style="margin: 0 0 10px 0;"><strong> Запись голоса (необязательно):</strong></p>
        <button id="recordBtn">🎤 Начать запись</button>
        <button id="stopRecordBtn" disabled> Стоп</button>
        <button id="playRecordBtn" disabled>▶ Прослушать запись</button>
        <button id="clearRecordBtn" disabled>🗑 Очистить</button>
        <p id="recordStatus" style="margin: 10px 0 0 0; color: #555;"></p>
      </div>

      <button id="nextBtn" style="background: #4CAF50; color: white; border: none; border-radius: 4px; margin-top: 15px;">Далее →</button>
    </div>

    <div id="doneMsg" style="display:none;">
      <h2>✅ Тест завершён!</h2>
      <p>Спасибо за участие!</p>
      <button id="restartBtn">Пройти тест ещё раз</button>
    </div>
  </div>

  <script>
    // ВАЖНО: замените на ваш рабочий URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxre4WDUeoBEyoHjgxCpubRIXLnjntON2CMEweu6NaeS_iw6JT6kOvdYbRen0WQDltp/exec";

    let stimuliOrder = [];
    let currentIndex = 0;
    let currentStimulusId = null;
    let currentAudioFile = null;
    let sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    let participantName = "";
    let mediaRecorder = null;
    let audioChunks = [];
    let recordedBlob = null;
    let mediaStream = null;

    const welcomeScreen = document.getElementById('welcomeScreen');
    const loadingMsg = document.getElementById('loadingMsg');
    const stimulusArea = document.getElementById('stimulusArea');
    const doneMsg = document.getElementById('doneMsg');
    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const participantNameInput = document.getElementById('participantName');
    const stimulusText = document.getElementById('stimulusText');
    const stimulusAudio = document.getElementById('stimulusAudio');
    const audioSource = document.getElementById('audioSource');
    const playBtn = document.getElementById('playBtn');
    const textResponse = document.getElementById('textResponse');
    const recordBtn = document.getElementById('recordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const playRecordBtn = document.getElementById('playRecordBtn');
    const clearRecordBtn = document.getElementById('clearRecordBtn');
    const recordStatus = document.getElementById('recordStatus');

    // === СТАРТ ===
    startBtn.addEventListener('click', async () => {
      participantName = participantNameInput.value.trim() || 'Аноним';
      welcomeScreen.style.display = 'none';
      loadingMsg.style.display = 'block';
      await initTest();
    });

    // === РЕСТАРТ ===
    restartBtn.addEventListener('click', () => {
      stimuliOrder = [];
      currentIndex = 0;
      recordedBlob = null;
      textResponse.value = '';
      recordStatus.textContent = '';
      doneMsg.style.display = 'none';
      welcomeScreen.style.display = 'block';
      participantNameInput.value = '';
      sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    async function initTest() {
      try {
        const resp = await fetch(SCRIPT_URL + '?action=count');
        const data = await resp.json();
        const total = data.total;
        if (!total) {
          alert('Нет стимулов в таблице.');
          loadingMsg.style.display = 'none';
          welcomeScreen.style.display = 'block';
          return;
        }
        stimuliOrder = Array.from({length: total}, (_, i) => i);
        // Перемешиваем
        for (let i = stimuliOrder.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [stimuliOrder[i], stimuliOrder[j]] = [stimuliOrder[j], stimuliOrder[i]];
        }
        currentIndex = 0;
        await loadNext();
      } catch(e) {
        alert('Ошибка инициализации: ' + e.message);
        loadingMsg.style.display = 'none';
        welcomeScreen.style.display = 'block';
      }
    }

    // === ЗАГРУЗКА СЛЕДУЮЩЕГО ВОПРОСА ===
    async function loadNext() {
      if (currentIndex >= stimuliOrder.length) {
        loadingMsg.style.display = 'none';
        stimulusArea.style.display = 'none';
        doneMsg.style.display = 'block';
        return;
      }
      loadingMsg.style.display = 'block';
      stimulusArea.style.display = 'none';

      const index = stimuliOrder[currentIndex];
      try {
        const resp = await fetch(SCRIPT_URL + '?action=getItem&index=' + index);
        const data = await resp.json();
        if (data.done) {
          loadingMsg.style.display = 'none';
          doneMsg.style.display = 'block';
          return;
        }
        currentStimulusId = data.id;
        stimulusText.textContent = data.text;
        currentAudioFile = data.audioFile || null;
        
        // Аудио
        if (currentAudioFile) {
          audioSource.src = currentAudioFile;
          stimulusAudio.load();
          stimulusAudio.style.display = 'block';
          playBtn.style.display = 'none';
          // Пробуем автоплей
          stimulusAudio.play().catch(e => {
            console.log('Автоплей заблокирован');
            playBtn.style.display = 'inline-block';
          });
        } else {
          stimulusAudio.style.display = 'none';
          playBtn.style.display = 'none';
        }
        
        // Сброс формы
        textResponse.value = '';
        recordedBlob = null;
        playRecordBtn.disabled = true;
        clearRecordBtn.disabled = true;
        recordBtn.disabled = false;
        stopRecordBtn.disabled = true;
        recordStatus.textContent = '';

        loadingMsg.style.display = 'none';
        stimulusArea.style.display = 'block';
      } catch (e) {
        alert('Ошибка загрузки: ' + e.message);
        loadingMsg.style.display = 'none';
        stimulusArea.style.display = 'block';
      }
    }

    // === КНОПКА ПОВТОРА АУДИО ===
    playBtn.addEventListener('click', () => {
      stimulusAudio.currentTime = 0;
      stimulusAudio.play().catch(e => alert('Не удалось воспроизвести: ' + e.message));
    });

    // === ЗАПИСЬ АУДИО ===
    recordBtn.addEventListener('click', async () => {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          recordStatus.textContent = '❌ Браузер не поддерживает запись';
          return;
        }
        
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordStatus.textContent = ' Идёт запись...';
        
        mediaRecorder = new MediaRecorder(mediaStream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
          recordBtn.disabled = false;
          stopRecordBtn.disabled = true;
          playRecordBtn.disabled = false;
          clearRecordBtn.disabled = false;
          recordStatus.textContent = '✅ Запись готова (' + (recordedBlob.size / 1024).toFixed(1) + ' KB)';
          if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
          }
        };
        
        mediaRecorder.start();
        recordBtn.disabled = true;
        stopRecordBtn.disabled = false;
        playRecordBtn.disabled = true;
        clearRecordBtn.disabled = true;
        
      } catch (err) {
        console.error('Ошибка микрофона:', err);
        if (err.name === 'NotAllowedError') {
          recordStatus.textContent = '❌ Доступ к микрофону запрещён. Разрешите в настройках браузера (иконка замка 🔒 в адресной строке).';
        } else if (err.name === 'NotFoundError') {
          recordStatus.textContent = ' Микрофон не найден.';
        } else {
          recordStatus.textContent = '❌ Ошибка: ' + err.message;
        }
      }
    });

    stopRecordBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    });

    playRecordBtn.addEventListener('click', () => {
      if (recordedBlob) {
        const url = URL.createObjectURL(recordedBlob);
        const a = new Audio(url);
        a.play();
      }
    });

    clearRecordBtn.addEventListener('click', () => {
      recordedBlob = null;
      audioChunks = [];
      playRecordBtn.disabled = true;
      clearRecordBtn.disabled = true;
      recordStatus.textContent = '';
    });

    // === ОТПРАВКА ОТВЕТА ===
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    nextBtn.addEventListener('click', async () => {
      const txt = textResponse.value.trim();
      let audioBase64 = null;
      if (recordedBlob) {
        try {
          audioBase64 = await blobToBase64(recordedBlob);
        } catch(e) {
          console.error('Ошибка конвертации аудио:', e);
        }
      }
      
      nextBtn.disabled = true;
      nextBtn.textContent = 'Отправка...';
      
      try {
        // ВАЖНО: без headers, чтобы не было CORS preflight
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'submit',
            stimulusId: currentStimulusId,
            textResponse: txt,
            audioData: audioBase64,
            participantName: participantName,
            sessionId: sessionId
          })
        });
        currentIndex++;
        await loadNext();
      } catch (e) {
        alert('Ошибка отправки: ' + e.message);
      } finally {
        nextBtn.disabled = false;
        nextBtn.textContent = 'Далее →';
      }
    });
  </script>
</body>
</html>
